<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><rect width="1280" height="760" rx="28" fill="#080b13"/><rect x="42" y="42" width="1196" height="676" rx="22" fill="#111625"/><circle cx="78" cy="76" r="7" fill="#ff6b6b"/><circle cx="102" cy="76" r="7" fill="#f0b94a"/><circle cx="126" cy="76" r="7" fill="#39c98a"/><text x="72" y="142" fill="#a995ff" font-family="monospace" font-size="18">vector&lt;int&gt; twoSum(vector&lt;int&gt;&amp; nums, int target) {</text><text x="96" y="186" fill="#55d6ff" font-family="monospace" font-size="18">unordered_map&lt;int, int&gt; seen;</text><text x="96" y="230" fill="#d7dce6" font-family="monospace" font-size="18">for (int i = 0; i &lt; nums.size(); i++) {</text><text x="120" y="274" fill="#d7dce6" font-family="monospace" font-size="18">int complement = target - nums[i];</text><text x="120" y="318" fill="#d7dce6" font-family="monospace" font-size="18">if (seen.count(complement))</text><text x="144" y="362" fill="#9d86ff" font-family="monospace" font-size="18">return {seen[complement], i};</text><text x="120" y="406" fill="#d7dce6" font-family="monospace" font-size="18">seen[nums[i]] = i;</text><text x="96" y="450" fill="#d7dce6" font-family="monospace" font-size="18">}</text><text x="96" y="494" fill="#9d86ff" font-family="monospace" font-size="18">return {};</text><text x="72" y="538" fill="#a995ff" font-family="monospace" font-size="18">}</text><rect x="72" y="584" width="1136" height="94" rx="14" fill="#181e2e"/><text x="96" y="622" fill="#55d6ff" font-family="Arial" font-size="15" font-weight="700">Complexity</text><text x="96" y="652" fill="#9aa5b9" font-family="Arial" font-size="14">Time O(n) · Space O(n) · Pattern: hash map complement lookup</text></svg>
